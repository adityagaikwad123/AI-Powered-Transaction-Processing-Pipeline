<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f3a4a"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 15px Arial, sans-serif; fill: #4b5563; }
      .box-title { font: 700 18px Arial, sans-serif; fill: #111827; }
      .box-text { font: 14px Arial, sans-serif; fill: #374151; }
      .edge { stroke: #2f3a4a; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .edge-dash { stroke: #6b7280; stroke-width: 2.5; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
      .label { font: 13px Arial, sans-serif; fill: #111827; }
      .note { font: 13px Arial, sans-serif; fill: #6b7280; }
    </style>
  </defs>

  <rect width="1280" height="760" fill="#f8fafc"/>
  <text x="60" y="56" class="title">Transaction Processing Pipeline Architecture</text>
  <text x="60" y="84" class="subtitle">Actual Docker Compose runtime: FastAPI, PostgreSQL, Redis, Celery, and the default fallback LLM client. Gemini is optional.</text>

  <rect x="60" y="150" width="190" height="92" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="92" y="185" class="box-title">Client</text>
  <text x="92" y="211" class="box-text">curl / Swagger UI</text>

  <rect x="340" y="150" width="210" height="92" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="378" y="185" class="box-title">FastAPI API</text>
  <text x="378" y="211" class="box-text">upload + polling</text>

  <rect x="640" y="118" width="230" height="92" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="680" y="153" class="box-title">PostgreSQL</text>
  <text x="680" y="179" class="box-text">jobs, transactions, summaries</text>

  <rect x="640" y="284" width="230" height="92" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="685" y="319" class="box-title">Redis Queue</text>
  <text x="685" y="345" class="box-text">Celery broker + backend</text>

  <rect x="960" y="284" width="220" height="92" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="1008" y="319" class="box-title">Celery Worker</text>
  <text x="1008" y="345" class="box-text">background processing</text>

  <rect x="960" y="470" width="220" height="106" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="996" y="506" class="box-title">Processing Pipeline</text>
  <text x="996" y="532" class="box-text">clean rows</text>
  <text x="996" y="555" class="box-text">detect anomalies</text>

  <rect x="640" y="470" width="230" height="106" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="690" y="506" class="box-title">LLM Client</text>
  <text x="690" y="532" class="box-text">categorization</text>
  <text x="690" y="555" class="box-text">narrative summary</text>

  <rect x="330" y="438" width="220" height="92" rx="8" fill="#ecfccb" stroke="#65a30d" stroke-width="2"/>
  <text x="382" y="473" class="box-title">Fallback LLM</text>
  <text x="382" y="499" class="box-text">default in Compose</text>

  <rect x="330" y="584" width="220" height="92" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="393" y="619" class="box-title">Gemini API</text>
  <text x="393" y="645" class="box-text">optional provider</text>

  <path class="edge" d="M250 196 H340"/>
  <text x="262" y="182" class="label">POST CSV</text>

  <path class="edge" d="M550 177 C585 168 602 164 640 164"/>
  <text x="566" y="154" class="label">create job</text>

  <path class="edge" d="M550 219 C594 254 606 300 640 318"/>
  <text x="560" y="285" class="label">enqueue task</text>

  <path class="edge" d="M870 330 H960"/>
  <text x="886" y="316" class="label">deliver task</text>

  <path class="edge" d="M1070 376 V470"/>
  <text x="1084" y="429" class="label">process CSV</text>

  <path class="edge" d="M960 523 H870"/>
  <text x="888" y="510" class="label">LLM calls</text>

  <path class="edge" d="M640 504 H550"/>
  <text x="558" y="491" class="label">default</text>

  <path class="edge-dash" d="M640 550 C600 600 592 630 550 630"/>
  <text x="560" y="615" class="label">optional</text>

  <path class="edge" d="M1000 470 C920 394 840 260 790 210"/>
  <text x="875" y="365" class="label">store results</text>

  <path class="edge" d="M155 242 C155 700 755 700 755 210"/>
  <text x="236" y="706" class="label">GET /jobs, /status, /results through API</text>
  <text x="696" y="242" class="note">API reads persisted state</text>
</svg>
